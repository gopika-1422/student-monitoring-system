version: '3.9'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: attendance_backend
    ports:
      - "8000:8000"
    volumes:
      - ./storage:/app/storage
      - ./backend/.env:/app/.env
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./attendance.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: attendance_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

